--- 
- name: Create Tier-0 Gateway with BGP on VLAN11 uplink - Active-Active
  hosts: localhost
  connection: local
  gather_facts: false
  
  vars:
    nsxt_host: "192.168.50.102"
    nsxt_user: "admin"
    nsxt_pass: "VMware1@VMware1@"
    
    # Uplink segment details
    uplink_segment_name: "segment-uplink-vlan11"
    
    # Edge cluster details
    edge_cluster_name: "edge-cluster-01"
    
    # Edge node 1
    edge_node1_name: "edge1"
    edge_node1_uplink_ip: "10.11.11.251"
    edge_node1_prefix_len: 24
    
    # # Edge node 2
    # edge_node2_name: "edge2"
    # edge_node2_uplink_ip: "10.11.11.252"
    # edge_node2_prefix_len: 24
    
    # BGP configuration
    local_as: "65003"
    
    # Neighbor 1 — peer of edge1 uplink (10.11.11.253)
    neighbor1_ip: "10.11.11.254"
    neighbor1_as: "65001"
    
    # # Neighbor 2 — peer of edge2 uplink (10.11.11.252)
    # neighbor2_ip: "10.11.11.251"
    # neighbor2_as: "65003"
  
  tasks:
    - name: Create Tier-0 Gateway Active-Active with dual uplink interfaces and BGP
      vmware.ansible_for_nsxt.nsxt_policy_tier0:
        hostname: "{{ nsxt_host }}"
        username: "{{ nsxt_user }}"
        password: "{{ nsxt_pass }}"
        validate_certs: false
        
        # Basic Tier-0 configuration
        display_name: "t0-01"
        description: "Tier-0 Gateway Active-Active with VLAN11 uplinks and BGP"
        state: present
        # ha_mode: "ACTIVE_ACTIVE"          # Changed from ACTIVE_STANDBY
        ha_mode: "ACTIVE_STANDBY"          # Changed from ACTIVE_STANDBY
        disable_firewall: true
        force_whitelisting: true
        # Note: failover_mode is not applicable in ACTIVE_ACTIVE and has been removed
        
        # Locale Services
        locale_services:
          - state: present
            id: "default-locale-service"
            display_name: "default-locale-service"
            
            # Edge cluster info
            edge_cluster_info:
              edge_cluster_display_name: "{{ edge_cluster_name }}"
            
            # Uplink interfaces — one per edge node
            interfaces:
              # Edge node 1 uplink
              - state: present
                id: "vlan11-uplink-edge1"
                display_name: "vlan11-uplink-edge1"
                segment_display_name: "{{ uplink_segment_name }}"
                subnets:
                  - ip_addresses: ["{{ edge_node1_uplink_ip }}"]
                    prefix_len: "{{ edge_node1_prefix_len }}"
                urpf_mode: "STRICT"
                mtu: 1500
                type: "EXTERNAL"
                edge_node_info:
                  site_id: "default"
                  enforcementpoint_id: "default"
                  edge_cluster_display_name: "{{ edge_cluster_name }}"
                  edge_node_display_name: "{{ edge_node1_name }}"
              
              # # Edge node 2 uplink
              # - state: present
              #   id: "vlan11-uplink-edge2"
              #   display_name: "vlan11-uplink-edge2"
              #   segment_display_name: "{{ uplink_segment_name }}"
              #   subnets:
              #     - ip_addresses: ["{{ edge_node2_uplink_ip }}"]
              #       prefix_len: "{{ edge_node2_prefix_len }}"
              #   urpf_mode: "STRICT"
              #   mtu: 1500
              #   type: "EXTERNAL"
              #   edge_node_info:
              #     site_id: "default"
              #     enforcementpoint_id: "default"
              #     edge_cluster_display_name: "{{ edge_cluster_name }}"
              #     edge_node_display_name: "{{ edge_node2_name }}"
            
            # BGP Configuration
            BGP:
              state: present
              enabled: true
              local_as_num: "{{ local_as }}"
              inter_sr_ibgp: false           # Must be true for ACTIVE_ACTIVE — enables iBGP between SRs
              graceful_restart_config:
                mode: "GR_AND_HELPER"
                timer:
                  restart_timer: 180
                  stale_route_timer: 600
              
              # BGP Neighbors
              neighbors:
                # Neighbor 1 — peer of edge1 uplink (10.11.11.253), AS 65001
                - state: present
                  display_name: "bgp-neighbor-{{ neighbor1_ip }}"
                  neighbor_address: "{{ neighbor1_ip }}"
                  remote_as_num: "{{ neighbor1_as }}"
                  keep_alive_time: 60
                  hold_down_time: 180
                  allow_as_in: false
                  bfd:
                    enabled: false
                    interval: 1000
                    multiple: 3
                
                # # Neighbor 2 — peer of edge2 uplink (10.11.11.252), AS 65003
                # - state: present
                #   display_name: "bgp-neighbor-{{ neighbor2_ip }}"
                #   neighbor_address: "{{ neighbor2_ip }}"
                #   remote_as_num: "{{ neighbor2_as }}"
                #   keep_alive_time: 60
                #   hold_down_time: 180
                #   allow_as_in: false
                #   bfd:
                #     enabled: false
                #     interval: 1000
                #     multiple: 3
            
            # Route Redistribution - ALL TYPES
            route_redistribution_config:
              bgp_enabled: true
              redistribution_rules:
                - name: "redistribute-all-routes"
                  route_redistribution_types: 
                    - "TIER0_STATIC"
                    - "TIER0_CONNECTED"
                    - "TIER1_STATIC"
                    - "TIER0_EXTERNAL_INTERFACE"
                    - "TIER0_LOOPBACK_INTERFACE"
                    - "TIER0_SEGMENT"
                    - "TIER0_ROUTER_LINK"
                    - "TIER0_SERVICE_INTERFACE"
                    - "TIER0_DNS_FORWARDER_IP"
                    - "TIER0_IPSEC_LOCAL_IP"
                    - "TIER0_NAT"
                    - "TIER0_EVPN_TEP_IP"
                    - "TIER1_NAT"
                    - "TIER1_LB_VIP"
                    - "TIER1_LB_SNAT"
                    - "TIER1_DNS_FORWARDER_IP"
                    - "TIER1_CONNECTED"
                    - "TIER1_SERVICE_INTERFACE"
                    - "TIER1_SEGMENT"
                    - "TIER1_IPSEC_LOCAL_ENDPOINT"