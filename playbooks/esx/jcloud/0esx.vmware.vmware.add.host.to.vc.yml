---
- name: Add ESXi hosts to the cluster and exit maintenance mode
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    esxi_hosts:
      - ip: "192.168.52.1"
      - ip: "192.168.52.2"
      - ip: "192.168.52.3"
    vcenter_hostname: "192.168.50.90"
    vcenter_username: "administrator@vsphere.local"
    vcenter_password: "VMware1@VMware1@"
    vcenter_validate_certs: false
    datacenter_name: "Datacenter"
    cluster_name: "cluster"

  tasks:
    - name: Add ESXi hosts to cluster
      community.vmware.vmware_host:
        hostname: "{{ vcenter_hostname }}"
        username: "{{ vcenter_username }}"
        password: "{{ vcenter_password }}"
        datacenter_name: "{{ datacenter_name }}"
        cluster_name: "{{ cluster_name }}"
        esxi_hostname: "{{ item.ip }}"
        esxi_username: "root"
        esxi_password: "VMware1@VMware1@"
        validate_certs: false
        state: present
      loop: "{{ esxi_hosts }}"
      register: host_results

    - name: Exit maintenance mode for all hosts
      community.vmware.vmware_host_powerstate:
        hostname: "{{ vcenter_hostname }}"
        username: "{{ vcenter_username }}"
        password: "{{ vcenter_password }}"
        esxi_hostname: "{{ item.item.ip }}"
        state: present
        validate_certs: false
      loop: "{{ host_results.results }}"
      when: item.changed or not item.failed
      register: maintenance_results

    - name: Show results summary
      debug:
        msg: |
          Host addition results:
          {% for result in host_results.results %}
          - {{ result.item.ip }}: {{ 'Added' if result.changed else 'Already present' }}
          {% endfor %}
